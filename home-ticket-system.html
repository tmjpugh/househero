function ViewTicketModal({ ticket, onClose, onUpdate, onAddComment, data, inventory, onViewInventory, allTickets }) {
    const [editing, setEditing] = useState(false);
    const [formData, setFormData] = useState(ticket);
    const [newComment, setNewComment] = useState('');
    const [commentAuthor, setCommentAuthor] = useState(data.people[0] || 'Self');

    const getInventoryItemName = () => {
        if (!ticket.inventory_item_id || !inventory) return null;
        const item = inventory.find(i => i.id === ticket.inventory_item_id);
        return item ? item.name : null;
    };

    const handleSave = () => {
        // Detect changed fields and generate system comments
        const trackedFields = [
            { key: 'status', label: 'Status' },
            { key: 'priority', label: 'Priority' },
            { key: 'requester', label: 'Requester' },
            { key: 'room', label: 'Room' },
            { key: 'title', label: 'Title' },
            { key: 'type', label: 'Type' },
        ];
        const changeComments = [];
        for (const field of trackedFields) {
            const oldVal = ticket[field.key] != null ? String(ticket[field.key]) : '';
            const newVal = formData[field.key] != null ? String(formData[field.key]) : '';
            if (oldVal !== newVal) {
                changeComments.push({
                    text: `${field.label} changed from "${oldVal || '(none)'}" to "${newVal || '(none)'}"`,
                    author: 'System',
                    is_system: true
                });
            }
        }
        // Handle estimated_cost separately with currency formatting
        const oldCost = ticket.estimated_cost != null && ticket.estimated_cost !== '' ? formatCurrency(ticket.estimated_cost) : '(none)';
        const newCost = formData.estimated_cost != null && formData.estimated_cost !== '' ? formatCurrency(formData.estimated_cost) : '(none)';
        if (oldCost !== newCost) {
            changeComments.push({
                text: `Estimated Cost changed from "${oldCost}" to "${newCost}"`,
                author: 'System',
                is_system: true
            });
        }
        onUpdate(ticket.id, formData, changeComments);
        setEditing(false);
    };

    const handleAddComment = () => {
        if (newComment.trim()) {
            onAddComment(ticket.id, {
                text: newComment,
                author: commentAuthor
            });
            setNewComment('');
        }
    };

    const inventoryItemName = getInventoryItemName();

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                    <h2>Ticket #{ticket.id}</h2>
                    <button className="close-btn" onClick={onClose}>×</button>
                </div>
                <div className="modal-body">
                    {!editing ? (
                        <div>
                            <h3>{ticket.title}</h3>
                            <div style={{ marginTop: '1rem', marginBottom: '1rem' }}>
                                <span className="badge badge-status" style={{ marginRight: '0.5rem' }}>{ticket.status}</span>
                                <span className="badge badge-priority">{ticket.priority}</span>
                            </div>
                            <div style={{ display: 'grid', gap: '1rem', marginTop: '1.5rem' }}>
                                <div><strong>Type:</strong> {ticket.type}</div>
                                <div><strong>Requester:</strong> {ticket.requester}</div>
                                <div><strong>Room:</strong> {ticket.room}</div>
                                {inventoryItemName && <div><strong>Inventory Item:</strong> {inventoryItemName}</div>}
                                {ticket.estimated_cost && <div><strong>Cost:</strong> {formatCurrency(ticket.estimated_cost)}</div>}
                                <div><strong>Created:</strong> {formatDate(ticket.created_at)}</div>
                            </div>

                            <div style={{ marginTop: '1.5rem' }}>
                                <strong>Description:</strong>
                                <p style={{ marginTop: '0.5rem', color: '#666' }}>{ticket.description || 'N/A'}</p>
                            </div>

                            <div className="comments-section">

                                    <div key={comment.id} className={`comment ${comment.is_system ? 'system-comment' : ''}`}>
                                        <div className="comment-header">
                                            <strong>{comment.author}</strong>

                                <div style={{ marginTop: '1.5rem' }}>

function ViewInventoryModal({ item, onClose, onUpdate, tickets, data, onViewTicket, onDocumentChange }) {
    const [editing, setEditing] = useState(false);
    const [formData, setFormData] = useState(item);
    const [localManuals, setLocalManuals] = useState(item.manuals || []);
    const [localReceipts, setLocalReceipts] = useState(item.receipts || []);
    const [uploading, setUploading] = useState(false);
    const [docError, setDocError] = useState('');

    const relatedTickets = tickets.filter(t => t.inventory_item_id && parseInt(t.inventory_item_id) === item.id);
    const openTickets = relatedTickets.filter(t => t.status !== 'closed');

    const handleSave = () => {
        onUpdate(item.id, formData);
        setEditing(false);
    };

    const handleUpload = async (e, type) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        setDocError('');
        try {
            const doc = await dbApi.uploadDocument(item.id, type, file, file.name);
            if (type === 'manual') {
                setLocalManuals(prev => [...prev, doc]);
            } else {
                setLocalReceipts(prev => [...prev, doc]);
            }
            onDocumentChange && onDocumentChange();
        } catch (err) {
            setDocError(`Upload failed: ${err.message}`);
        } finally {
            setUploading(false);
            e.target.value = '';
        }
    };

    const handleDeleteDoc = async (docId, type) => {
        setDocError('');
        try {
            await dbApi.deleteDocument(item.id, docId);
            if (type === 'manual') {
                setLocalManuals(prev => prev.filter(d => d.id !== docId));
            } else {
                setLocalReceipts(prev => prev.filter(d => d.id !== docId));
            }
            onDocumentChange && onDocumentChange();
        } catch (err) {
            setDocError(`Delete failed: ${err.message}`);
        }
    };

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                    <h2>{item.name}</h2>

                                <div><strong>Room:</strong> {item.room}</div>

                                {localReceipts.map(doc => (
                                    <div key={doc.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.4rem 0', borderBottom: '1px solid #eee' }}>
                                        <a href={doc.url} target="_blank" rel="noopener noreferrer" style={{ color: '#4f46e5', textDecoration: 'none', fontSize: '0.9rem' }}>{doc.name}</a>
                                        <button onClick={() => handleDeleteDoc(doc.id, 'receipt')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#dc2626', fontSize: '1rem', padding: '0 0.25rem' }} title="Remove">✕</button>
                                    </div>
                                ))}
                                <label style={{ display: 'inline-block', marginTop: '0.5rem', cursor: uploading ? 'not-allowed' : 'pointer', color: uploading ? '#aaa' : '#4f46e5', fontSize: '0.875rem' }}>
                                    {uploading ? 'Uploading…' : '+ Add Receipt'}
                                    <input type="file" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.txt" style={{ display: 'none' }} disabled={uploading} onChange={(e) => handleUpload(e, 'receipt')} />
                                </label>
                            </div>
                        </div>
                    )}
                </div>
                <div className="modal-footer">
                    {!editing ? (
                        <>
                            <button className="btn btn-secondary" onClick={onClose}>Close</button>
                            <button className="btn btn-primary" onClick={() => setEditing(true)}>
                                Edit Item
                            </button>
                        </>
                    ) : (
                        <>
                            <button className="btn btn-secondary" onClick={() => {
                                setFormData(item);
                                setEditing(false);
                            }}>Cancel</button>
                            <button className="btn btn-primary" onClick={handleSave}>
                                Save Changes
                            </button>
                        </>
                    )}
                </div>
            </div>
        </div>
    );
}

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
